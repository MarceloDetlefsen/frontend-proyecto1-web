<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">My<span>Tracker</span></a>
      <nav class="nav">
        <a href="index.html" class="active">Mi lista</a>
        <a href="crear.html">+ Nueva entrada</a>
      </nav>
    </div>
  </header>

  <main class="main">

    <div class="page-header-row">
      <p class="page-description">
        Tu lista de seguimiento personal. Pensada para
        <em>series</em>, pero funciona igual de bien para
        <em>álbumes</em>, <em>libros</em>,
        o lo que se te ocurra.
      </p>
      <p class="page-count" id="subtitle">Cargando...</p>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrapper">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" id="search" placeholder="Buscar..." type="search">
      </div>

      <select class="select-input" id="sort">
        <option value="id">Por fecha de adición</option>
        <option value="titulo">Título</option>
        <option value="progreso">Progreso</option>
        <option value="calificacion">Calificación</option>
        <option value="estado">Estado</option>
      </select>

      <select class="select-input" id="order">
        <option value="asc">Ascendente</option>
        <option value="desc">Descendente</option>
      </select>
    </div>

    <!-- Grid de cards -->
    <div class="cards-grid" id="cards-grid"></div>

    <!-- Paginación -->
    <div class="pagination" id="pagination"></div>

  </main>

  <!-- Modal editar -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Editar</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <form id="edit-form">
          <input type="hidden" id="edit-id">
          
          <div class="form-group">
            <label class="form-label">Título</label>
            <input class="form-input" id="edit-titulo" type="text" placeholder="Nombre">
            <span class="form-error" id="edit-titulo-error"></span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Episodio actual</label>
              <input class="form-input" id="edit-episodio-actual" type="number" min="0">
            </div>
            <div class="form-group">
              <label class="form-label">Total de episodios</label>
              <input class="form-input" id="edit-total-episodios" type="number" min="0">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Estado</label>
            <select class="form-select" id="edit-estado">
              <option value="pendiente">Pendiente</option>
              <option value="viendo">Viendo</option>
              <option value="completada">Completada</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Calificación (1–10)</label>
            <input class="form-input" id="edit-calificacion" type="number" min="1" max="10" step="0.1" placeholder="Opcional">
          </div>

          <div class="form-group">
            <label class="form-label">URL de imagen</label>
            <input class="form-input" id="edit-imagen" type="url" placeholder="https://...">
          </div>

          <div class="form-group">
            <label class="form-label">Descripción</label>
            <textarea class="form-input" id="edit-descripcion" rows="3" placeholder="Sinopsis, notas..." style="resize:vertical"></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="modal-cancel">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
